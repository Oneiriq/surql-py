site_name: surql
site_url: https://oneiriq.github.io/surql-py
site_description: Code-first database toolkit for SurrealDB
site_author: Oneiriq
repo_url: https://github.com/Oneiriq/surql-py
repo_name: Oneiriq/surql-py
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: ["."]
  - attr_list
  - md_in_html

plugins:
  - search
  - minify:
      minify_html: true

exclude_docs: |
  examples/output/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - Guides:
      - Schema Definition: schema.md
      - Migrations: migrations.md
      - Query Builder: queries.md
      - Query UX Helpers: query-ux.md
      - SurrealDB v3 Patterns: v3-patterns.md
      - Query Hints: query_hints.md
      - Caching: caching.md
      - Streaming: streaming.md
      - Orchestration: orchestration.md
      - Versioning & Rollback: versioning_rollback.md
  - Reference:
      - CLI: cli.md
      - API: api/index.md
      - Visualization: visualization.md
  - Examples: examples/index.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oneiriq/surql-py
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/oneiriq-surql/
